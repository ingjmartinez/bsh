services:
  app:
    build: .
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://bshsupport.com
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: bsh
      DB_USERNAME: bsh_user
      DB_PASSWORD: OtormKr2CrnBFxvlvXik
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      REDIS_HOST: redis
    volumes:
      - ./:/var/www
      - storage_data:/var/www/storage
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./:/var/www:ro
      - storage_data:/var/www/storage
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bsh
      MYSQL_USER: bsh_user
      MYSQL_PASSWORD: OtormKr2CrnBFxvlvXik
      MYSQL_ROOT_PASSWORD: OtormKr2CrnBFxvlvXik
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - db

  worker:
    build: .
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: bsh
      DB_USERNAME: bsh_user
      DB_PASSWORD: OtormKr2CrnBFxvlvXik
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
    volumes:
      - ./:/var/www
      - storage_data:/var/www/storage
    depends_on:
      - db
      - redis

  scheduler:
    build: .
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: bsh
      DB_USERNAME: bsh_user
      DB_PASSWORD: OtormKr2CrnBFxvlvXik
      REDIS_HOST: redis
    volumes:
      - ./:/var/www
      - storage_data:/var/www/storage
    depends_on:
      - db
      - redis

volumes:
  db_data:
  storage_data:
